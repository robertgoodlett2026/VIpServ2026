name: Append Text to File

on:
  workflow_dispatch:  # دکمه دستی در GitHub

jobs:
  update-file:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_WORKFLOW }}

      - name: Append Text to File
        run: |
          echo "=====================================" >> myConfigSub.txt
          echo "Last Update: $(date '+%Y-%m-%d %H:%M:%S')" >> myConfigSub.txt
          echo "Workflow run by: ${{ github.actor }}" >> myConfigSub.txt
          echo "Commit SHA: ${{ github.sha }}" >> myConfigSub.txt
          echo "" >> myConfigSub.txt
          
          echo "✅ متن با موفقیت اضافه شد!"

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add myConfigSub.txt
          git commit -m "chore: update myConfigSub.txt by GitHub Actions" || echo "No changes to commit"
          git push
